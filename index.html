<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة العنقود الرقمية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb; --success: #10b981; --danger: #ef4444;
            --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --gray: #94a3b8;
            --border-gold: #b8860b; /* أصفر غامق/ذهبي للإطارات */
        }

        body.dark-mode { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --border-gold: #d4a017; }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text); 
            margin: 0; padding: 0; min-height: 100vh; transition: 0.3s;
        }

        /* خلفية الشعار الشفافة (Watermark) */
        .watermark-bg {
            background-image: url('https://github.com/Sami-ghannam/Beit-Alroosh-AlTehta-School/blob/main/logo.png?raw=true');
            background-repeat: no-repeat; background-position: center; background-size: 60%;
            background-attachment: fixed; opacity: 0.05; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        }

        /* الحاوية الرئيسية بإطار أصفر منحني */
        .main-container {
            border: 4px solid var(--border-gold); border-radius: 35px;
            background: var(--card); margin: 15px auto; padding: 15px;
            max-width: 500px; width: 92%; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative; overflow: hidden;
        }

        /* شاشات الحالة (تحميل / فشل) */
        #statusOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); z-index: 5000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        body.dark-mode #statusOverlay { background: rgba(15,23,42,0.95); }

        /* التحكم في أحجام القوائم والبطاقات */
        .scroll-area { max-height: 400px; overflow-y: auto; padding-right: 5px; }
        .lesson-card { 
            border: 1px solid var(--gray); border-radius: 15px; padding: 12px; 
            margin-bottom: 10px; font-size: 0.85rem; background: rgba(255,255,255,0.5);
        }

        /* تنسيقات الجداول المصغرة */
        .admin-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .admin-table th, .admin-table td { padding: 8px; border-bottom: 1px solid var(--gray); text-align: center; }

        /* الأزرار والشريط السفلي */
        .btn { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-primary { background: var(--primary); color: white; }
        .quick-links-bar { 
            position: fixed; bottom: 0; width: 100%; background: var(--card); 
            display: flex; justify-content: space-around; padding: 10px 0;
            border-top: 2px solid var(--border-gold); z-index: 4000;
        }
        .q-link { font-size: 0.6rem; text-align: center; color: var(--text); cursor: pointer; }
        .q-link i { display: block; font-size: 1.2rem; color: var(--primary); margin-bottom: 3px; }

        /* التنبيهات */
        @keyframes blink { 50% { opacity: 0.5; } }
        .delay-warning { background-color: rgba(212, 160, 23, 0.2) !important; animation: blink 1.5s infinite; }
        
        .top-bar { padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; border-bottom: 1px solid var(--gray); }
    </style>
</head>
<body>

<div class="watermark-bg"></div>

<div id="statusOverlay" style="display: none;">
    <div id="statusContent">
        <i class="fas fa-sync fa-spin fa-3x" style="color:var(--primary)"></i>
        <h3 id="statusTitle">جاري مزامنة البيانات...</h3>
        <p id="statusDesc">يرجى الانتظار، نتأكد من وقت السيرفر (7-10 ثوانٍ)</p>
        <button id="retryBtn" class="btn btn-primary" style="display:none; width:150px" onclick="loadData()">إعادة المحاولة</button>
    </div>
</div>

<div class="top-bar">
    <div class="live-clock">--:--:--</div>
    <div id="headerTitle">منصة العنقود</div>
    <div onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></div>
</div>

<div id="loginScreen" class="main-container" style="text-align: center; margin-top: 50px;">
    <img src="https://github.com/Sami-ghannam/Beit-Alroosh-AlTehta-School/blob/main/logo.png?raw=true" width="80">
    <h2 style="color:var(--primary); margin:10px 0">أهلاً بك</h2>
    <input type="text" id="sysPass" placeholder="رمز الدخول" style="width:80%; padding:10px; border-radius:10px; border:1px solid var(--gray); text-align:center;">
    <button class="btn btn-primary" onclick="handleLogin()" style="width:85%; margin-top:15px;">دخول آمن</button>
    <button class="btn" style="background:#666; color:white; width:85%" onclick="window.location.href='https://google.com'">خروج نهائي</button>
</div>

<div id="mainApp" class="main-container" style="display:none">
    <div id="adminPanel" style="display:none">
        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:5px; margin-bottom:10px;">
            <div class="lesson-card" style="text-align:center; padding:5px;"><b id="statLive">0</b><br><small>مباشر</small></div>
            <div class="lesson-card" style="text-align:center; padding:5px;"><b id="statPending">0</b><br><small>قادم</small></div>
            <div class="lesson-card" style="text-align:center; padding:5px;"><b id="statDone">0%</b><br><small>إنجاز</small></div>
        </div>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--gray); padding-bottom:5px; margin-bottom:10px;">
        <span id="userBadge" style="font-weight:bold; font-size:0.8rem; color:var(--primary)"></span>
        <button onclick="handleLogout()" style="background:none; border:none; color:var(--danger); cursor:pointer">خروج</button>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-bottom:10px;">
        <select id="daySelect" onchange="updateUI()" style="padding:8px; border-radius:8px;"></select>
        <select id="gradeSelect" onchange="updateUI()" style="padding:8px; border-radius:8px;">
            <option value="">كل الصفوف</option>
            <script>for(let i=1;i<=12;i++) document.write(`<option value="${i}">${i}</option>`);</script>
        </select>
    </div>

    <div id="displayArea" class="scroll-area"></div>
</div>

<div class="quick-links-bar">
    <div class="q-link" onclick="loadData()"><i class="fas fa-sync"></i>مزامنة</div>
    <div class="q-link" onclick="alert('تعليمات: اللون الأصفر الوامض يعني تأخر المعلم عن الموعد بـ 5 دقائق.')"><i class="fas fa-question-circle"></i>تعليمات</div>
    <div class="q-link" onclick="window.location.href='mailto:sami@example.com'"><i class="fas fa-envelope"></i>راسلنا</div>
    <div class="q-link" onclick="alert('منصة العنقود v3.5\nبرمجة: م. سامي غنام\nنظام الإشراف الذكي')"><i class="fas fa-info-circle"></i>حول</div>
</div>

<script>
    const sheetURL = '
